# Cloud resource schema — the single source of truth.
#
# This schema is VENDOR-NEUTRAL: each entry describes a generic, cloud-agnostic
# architectural resource (e.g. "virtual_network", "kubernetes_cluster") and then maps it
# onto concrete Terraform resource types per provider. Deploy-ordering edges are
# modeled between the generic resources, not the provider resources.
#
# Entry shape:
#   - id:            unique, snake_case resource name (the generic resource).
#     category:         the resource's domain — one of the `categories` below.
#     layer:         deploy tier number (must match a `layers` entry). The suggested
#                    monorepo folder is <provider>/<layer>-<category>-<your-name>/, and
#                    the <layer> prefix is the apply-order contract (low to high).
#     description:   one-line human summary.
#     terraformResources: provider-keyed map; list only the providers that apply.
#                    Cloud resources use aws/gcp/azure (empty [] = no clean equivalent);
#                    cross-cutting resources use kubernetes/helm/kubectl. At least one
#                    list must be non-empty — never force a false mapping.
#     deployAfter:    ids that must be deployed BEFORE this one — because this
#                    resource's own config (or its standard companion resource)
#                    references them at deploy time. Config-reference test; keep
#                    sparse, acyclic, closest-node-only (see README.md).
#                    Invariant: layer(self) > layer(dep) for every deployAfter dep.
#
# See README.md for the modeling philosophy and how to extend this file safely.

providers:
  - aws
  - gcp
  - azure
  - kubernetes
  - helm
  - kubectl

# Deployment universes: a hard stack boundary sits wherever a deployAfter edge
# crosses between these (the downstream provider must be configured from an
# already-applied resource — e.g. the kubernetes provider needs a live cluster).
universes:
  cloud: [aws, gcp, azure]
  cluster: [kubernetes, helm, kubectl]

categories: [networking, security, compute, storage, data, governance, ml, devops]

# Deploy-order tiers. The folder prefix <NN> is the deployment contract: apply low to high.
layers:
  - number: 0
    description: Roots — depend on nothing.
  - number: 10
    description: Built directly on the L00 roots.
  - number: 20
    description: Managed services and clusters.
  - number: 30
    description: Gateways, load balancers, platform extensions.
  - number: 40
    description: Fleets, endpoints, attachments.
  - number: 50
    description: Where workloads run.
  - number: 60
    description: Running services and jobs.
  - number: 70
    description: Edge delivery.
  - number: 80
    description: Edge protection.

resources:
  # ----------------------------------------------------------------------------
  # Networking
  # ----------------------------------------------------------------------------
  - id: virtual_network
    category: networking
    layer: 0
    description: Isolated virtual network (VPC / VNet).
    terraformResources:
      aws: [aws_vpc]
      gcp: [google_compute_network]
      azure: [azurerm_virtual_network]
    deployAfter: []

  - id: subnet
    category: networking
    layer: 10
    description: IP range carved out of a network.
    terraformResources:
      aws: [aws_subnet]
      gcp: [google_compute_subnetwork]
      azure: [azurerm_subnet]
    deployAfter: [virtual_network]

  - id: route_table
    category: networking
    layer: 10
    description: Routing rules that steer traffic within/out of a network.
    terraformResources:
      aws: [aws_route_table, aws_route]
      gcp: [google_compute_route]
      azure: [azurerm_route_table, azurerm_route]
    deployAfter: [virtual_network]

  - id: internet_gateway
    category: networking
    layer: 10
    description: Egress/ingress to the public internet for a network.
    terraformResources:
      aws: [aws_internet_gateway, aws_egress_only_internet_gateway]
      gcp: []   # implicit via default internet routes; no standalone resource
      azure: [] # implicit outbound; no standalone gateway resource
    deployAfter: [virtual_network]

  - id: nat_gateway
    category: networking
    layer: 30
    description: Outbound-only internet access for private subnets.
    terraformResources:
      aws: [aws_nat_gateway]
      gcp: [google_compute_router_nat]
      azure: [azurerm_nat_gateway]
    deployAfter: [subnet, static_ip]

  - id: firewall
    category: networking
    layer: 10
    description: Stateful traffic filter / security group container.
    terraformResources:
      aws: [aws_security_group]
      gcp: [google_compute_network_firewall_policy, google_compute_firewall_policy]   # GCP has no SG container; rules attach directly (see firewall_rule)
      azure: [azurerm_network_security_group]
    deployAfter: [virtual_network]

  - id: firewall_rule
    category: networking
    layer: 20
    description: Individual ingress/egress rule (incl. AWS security group rules).
    terraformResources:
      aws: [aws_security_group_rule, aws_vpc_security_group_ingress_rule, aws_vpc_security_group_egress_rule]
      gcp: [google_compute_firewall, google_compute_network_firewall_policy_rule, google_compute_firewall_policy_rule]
      azure: [azurerm_network_security_rule]
    deployAfter: [firewall]

  - id: load_balancer
    category: networking
    layer: 30
    description: Distributes traffic across backends (L4/L7).
    terraformResources:
      aws: [aws_lb, aws_lb_listener, aws_lb_target_group]
      gcp: [google_compute_forwarding_rule, google_compute_backend_service, google_compute_url_map, google_compute_region_backend_service, google_compute_network_endpoint_group, google_compute_region_network_endpoint_group, google_compute_global_network_endpoint_group]
      azure: [azurerm_lb, azurerm_application_gateway]
    deployAfter: [subnet, firewall, tls_certificate, static_ip, identity]

  - id: dns_zone
    category: networking
    layer: 10
    description: Authoritative DNS namespace.
    terraformResources:
      aws: [aws_route53_zone]
      gcp: [google_dns_managed_zone]
      azure: [azurerm_dns_zone, azurerm_private_dns_zone]
    deployAfter: [virtual_network]

  - id: dns_record
    category: networking
    layer: 20
    description: A record set within a DNS zone.
    terraformResources:
      aws: [aws_route53_record]
      gcp: [google_dns_record_set]
      azure: [azurerm_dns_a_record, azurerm_dns_cname_record]
    deployAfter: [dns_zone]

  - id: tls_certificate
    category: networking
    layer: 10
    description: TLS/SSL certificate for terminating HTTPS.
    terraformResources:
      aws: [aws_acm_certificate]
      gcp: [google_compute_managed_ssl_certificate, google_certificate_manager_certificate, google_compute_ssl_certificate, google_compute_region_ssl_certificate]
      azure: [azurerm_key_vault_certificate]
    deployAfter: [secret_store]

  - id: vpn_gateway
    category: networking
    layer: 30
    description: Site-to-site / client VPN termination.
    terraformResources:
      aws: [aws_vpn_gateway, aws_vpn_connection, aws_customer_gateway]
      gcp: [google_compute_vpn_gateway, google_compute_vpn_tunnel, google_compute_ha_vpn_gateway, google_compute_external_vpn_gateway]
      azure: [azurerm_virtual_network_gateway, azurerm_virtual_network_gateway_connection, azurerm_vpn_gateway, azurerm_vpn_site, azurerm_local_network_gateway, azurerm_point_to_site_vpn_gateway]
    deployAfter: [static_ip, transit_gateway]

  - id: private_connectivity
    category: networking
    layer: 40
    description: Private access to services without traversing the internet
      (PrivateLink / Private Service Connect / Private Endpoint).
    terraformResources:
      aws: [aws_vpc_endpoint, aws_vpc_endpoint_service]
      gcp: [google_compute_service_attachment, google_service_networking_connection, google_network_connectivity_service_connection_policy, google_compute_network_attachment]
      azure: [azurerm_private_endpoint, azurerm_private_link_service]
    deployAfter: [load_balancer]

  # ----------------------------------------------------------------------------
  # Identity & security
  # ----------------------------------------------------------------------------
  - id: identity
    category: security
    layer: 0
    description: Workload/principal identity (IAM role / service account / managed identity).
    terraformResources:
      aws: [aws_iam_role, aws_iam_instance_profile, aws_iam_service_linked_role]
      gcp: [google_service_account, google_service_account_key]
      azure: [azurerm_user_assigned_identity]
    deployAfter: []

  - id: access_policy
    category: security
    layer: 10
    description: Permission grant / authorization rule attached to an identity.
    terraformResources:
      aws: [aws_iam_policy, aws_iam_role_policy]
      gcp: [google_project_iam_member, google_project_iam_binding, google_project_iam_custom_role, google_organization_iam_custom_role, google_iam_deny_policy, google_iam_access_boundary_policy]
      azure: [azurerm_role_assignment, azurerm_role_definition]
    deployAfter: [identity]

  - id: encryption_key
    category: security
    layer: 0
    description: Managed encryption key (KMS / Key Vault key).
    terraformResources:
      aws: [aws_kms_key, aws_kms_alias]
      gcp: [google_kms_key_ring, google_kms_crypto_key]
      azure: [azurerm_key_vault_key]
    deployAfter: []

  - id: secret
    category: security
    layer: 10
    description: An individual stored secret value.
    terraformResources:
      aws: [aws_secretsmanager_secret, aws_secretsmanager_secret_version]
      gcp: [google_secret_manager_secret, google_secret_manager_secret_version]
      azure: [azurerm_key_vault_secret]
    deployAfter: [secret_store]

  # ----------------------------------------------------------------------------
  # Compute & containers
  # ----------------------------------------------------------------------------
  - id: compute_instance
    category: compute
    layer: 50
    description: Virtual machine.
    terraformResources:
      aws: [aws_instance]
      gcp: [google_compute_instance, google_compute_instance_from_template]
      azure: [azurerm_linux_virtual_machine, azurerm_windows_virtual_machine]
    deployAfter: [identity, machine_image, ssh_key_pair, placement_group, dedicated_host, network_interface]

  - id: autoscaling_group
    category: compute
    layer: 40
    description: Self-healing, auto-scaling fleet of VMs.
    terraformResources:
      aws: [aws_autoscaling_group, aws_launch_template]
      gcp: [google_compute_instance_group_manager, google_compute_autoscaler, google_compute_instance_template, google_compute_region_instance_template, google_compute_region_instance_group_manager]
      azure: [azurerm_linux_virtual_machine_scale_set, azurerm_windows_virtual_machine_scale_set, azurerm_orchestrated_virtual_machine_scale_set]
    deployAfter: [identity, machine_image, ssh_key_pair, placement_group, dedicated_host, load_balancer, volume_snapshot]

  - id: serverless_function
    category: compute
    layer: 20
    description: Event-driven function-as-a-service.
    terraformResources:
      aws: [aws_lambda_function]
      gcp: [google_cloudfunctions2_function, google_cloudfunctions_function]
      azure: [azurerm_linux_function_app, azurerm_windows_function_app, azurerm_function_app_flex_consumption]
    deployAfter: [identity, object_storage, subnet, container_registry, firewall]

  - id: container_registry
    category: compute
    layer: 0
    description: Stores and serves container images.
    terraformResources:
      aws: [aws_ecr_repository]
      gcp: [google_artifact_registry_repository]
      azure: [azurerm_container_registry]
    deployAfter: []

  - id: container_service
    category: compute
    layer: 60
    description: Long-running container service (ECS service / Cloud Run / Container Apps).
    terraformResources:
      aws: [aws_ecs_service]
      gcp: [google_cloud_run_v2_service]
      azure: [azurerm_container_app]
    deployAfter: [container_environment, container_task_definition, load_balancer]

  - id: kubernetes_cluster
    category: compute
    layer: 20
    description: Managed Kubernetes control plane (EKS / GKE / AKS).
    terraformResources:
      aws: [aws_eks_cluster]
      gcp: [google_container_cluster, google_container_aws_cluster, google_container_azure_cluster, google_container_attached_cluster]
      azure: [azurerm_kubernetes_cluster]
    deployAfter: [subnet, firewall, identity]

  - id: kubernetes_node_pool
    category: compute
    layer: 30
    description: Group of worker nodes attached to a Kubernetes cluster.
    terraformResources:
      aws: [aws_eks_node_group, aws_eks_fargate_profile]
      gcp: [google_container_node_pool]
      azure: [azurerm_kubernetes_cluster_node_pool]
    deployAfter: [kubernetes_cluster, ssh_key_pair]

  - id: container_task_definition
    category: compute
    layer: 30
    description: Declarative container task spec (ECS task definition).
    terraformResources:
      aws: [aws_ecs_task_definition]
      gcp: []   # Cloud Run inlines the container spec on the service/job
      azure: [] # Container Apps inlines the container spec on the app
    deployAfter: [identity, container_registry, file_storage]

  - id: container_service_autoscaling
    category: compute
    layer: 70
    description: Scaling policy/target for a container service (ECS Application Auto Scaling).
    terraformResources:
      aws: [aws_appautoscaling_target, aws_appautoscaling_policy]
      gcp: []   # Cloud Run autoscales implicitly
      azure: [] # Container Apps scale rules are inline on the app
    deployAfter: [container_service]

  - id: container_job
    category: compute
    layer: 60
    description: Run-to-completion batch/container job (AWS Batch / Cloud Run Jobs / Container Apps Jobs).
    terraformResources:
      aws: [aws_batch_job_definition]
      gcp: [google_cloud_run_v2_job]
      azure: [azurerm_container_app_job]
    deployAfter: [container_registry, container_environment, secret]

  - id: container_instance
    category: compute
    layer: 20
    description: Single standalone container without an orchestrator (Azure Container Instances).
    terraformResources:
      aws: []   # no single-container resource; use ECS/Fargate (container_service)
      gcp: []   # use Cloud Run (container_service)
      azure: [azurerm_container_group]
    deployAfter: [identity, container_registry, subnet, object_storage, logging]

  # ----------------------------------------------------------------------------
  # Storage
  # ----------------------------------------------------------------------------
  - id: object_storage
    category: storage
    layer: 0
    description: Bucket-based object/blob storage.
    terraformResources:
      aws: [aws_s3_bucket]
      gcp: [google_storage_bucket]
      azure: [azurerm_storage_account, azurerm_storage_container]
    deployAfter: []

  - id: block_storage
    category: storage
    layer: 10
    description: Attachable raw block volume.
    terraformResources:
      aws: [aws_ebs_volume]
      gcp: [google_compute_disk]
      azure: [azurerm_managed_disk]
    deployAfter: [object_storage]

  - id: file_storage
    category: storage
    layer: 20
    description: Managed network file share (NFS/SMB).
    terraformResources:
      aws: [aws_efs_file_system, aws_efs_mount_target, aws_fsx_lustre_file_system, aws_fsx_windows_file_system, aws_fsx_ontap_file_system, aws_fsx_openzfs_file_system]
      gcp: [google_filestore_instance]
      azure: [azurerm_storage_share]
    deployAfter: [subnet, firewall, object_storage]

  - id: archive_storage
    category: storage
    layer: 0
    description: Cold/archival storage for rarely accessed data.
    terraformResources:
      aws: [aws_glacier_vault]
      gcp: []   # an "ARCHIVE" storage class of object_storage, not a separate resource
      azure: [] # an archive blob access tier, not a separate resource
    deployAfter: []

  - id: backup
    category: storage
    layer: 10
    description: Scheduled backups / snapshot policies and their vaults.
    terraformResources:
      aws: [aws_backup_vault, aws_backup_plan]
      gcp: [google_compute_resource_policy]
      azure: [azurerm_recovery_services_vault, azurerm_backup_policy_vm]
    deployAfter: [identity]

  # ----------------------------------------------------------------------------
  # Data & platform services
  # ----------------------------------------------------------------------------
  - id: relational_database
    category: data
    layer: 20
    description: Managed relational (SQL) database — see nosql_database for non-relational stores.
    terraformResources:
      aws: [aws_db_instance, aws_rds_cluster, aws_db_proxy]
      gcp: [google_sql_database_instance]
      azure: [azurerm_postgresql_flexible_server, azurerm_mysql_flexible_server, azurerm_mssql_server, azurerm_mssql_database, azurerm_mssql_managed_instance, azurerm_postgresql_flexible_server_database, azurerm_mysql_flexible_server_database]
    deployAfter: [subnet, firewall, identity, dns_zone]

  - id: cache
    category: data
    layer: 20
    description: Managed in-memory cache (Redis / Memcached).
    terraformResources:
      aws: [aws_elasticache_cluster, aws_elasticache_replication_group, aws_elasticache_serverless_cache]
      gcp: [google_redis_instance]
      azure: [azurerm_redis_cache]
    deployAfter: [subnet, firewall]

  - id: message_bus
    category: data
    layer: 0
    description: Publish/subscribe broadcast topic (see event_bus for rule-based routing).
    terraformResources:
      aws: [aws_sns_topic]
      gcp: [google_pubsub_topic]
      azure: [azurerm_servicebus_topic]
    deployAfter: []

  - id: queue
    category: data
    layer: 10
    description: Point-to-point message queue.
    terraformResources:
      aws: [aws_sqs_queue]
      gcp: [google_cloud_tasks_queue]
      azure: [azurerm_servicebus_queue, azurerm_storage_queue]
    deployAfter: [object_storage]

  - id: stream
    category: data
    layer: 0
    description: Ordered, replayable event/data stream.
    terraformResources:
      aws: [aws_kinesis_stream, aws_kinesis_firehose_delivery_stream]
      gcp: []   # GCP uses Pub/Sub (see message_bus) for streaming; no Kinesis-equivalent store
      azure: [azurerm_eventhub]
    deployAfter: []

  - id: analytics_warehouse
    category: data
    layer: 20
    description: Managed analytics / data warehouse.
    terraformResources:
      aws: [aws_redshift_cluster]
      gcp: [google_bigquery_dataset]
      azure: [azurerm_synapse_workspace, azurerm_synapse_sql_pool]
    deployAfter: [subnet, firewall, identity, object_storage]

  - id: logging
    category: data
    layer: 0
    description: Log collection, storage, and routing.
    terraformResources:
      aws: [aws_cloudwatch_log_group]
      gcp: [google_logging_project_sink, google_logging_project_bucket_config]
      azure: [azurerm_log_analytics_workspace]
    deployAfter: []

  - id: monitoring
    category: data
    layer: 10
    description: Metrics, alarms, and dashboards.
    terraformResources:
      aws: [aws_cloudwatch_metric_alarm, aws_cloudwatch_dashboard]
      gcp: [google_monitoring_alert_policy, google_monitoring_dashboard]
      azure: [azurerm_monitor_metric_alert, azurerm_monitor_action_group]
    deployAfter: [message_bus]

  - id: tracing
    category: data
    layer: 10
    description: Distributed request tracing.
    terraformResources:
      aws: [aws_xray_sampling_rule, aws_xray_group]
      gcp: []   # Cloud Trace is API-enabled; no provisioning resource
      azure: [azurerm_application_insights]
    deployAfter: [logging]

  - id: application_config
    category: data
    layer: 10
    description: Non-secret application configuration / parameter store.
    terraformResources:
      aws: [aws_ssm_parameter, aws_appconfig_application]
      gcp: [google_runtimeconfig_config]
      azure: [azurerm_app_configuration]
    deployAfter: [identity]

  - id: scheduler
    category: data
    layer: 20
    description: Cron/recurring task trigger.
    terraformResources:
      aws: [aws_scheduler_schedule]
      gcp: [google_cloud_scheduler_job]
      azure: [azurerm_logic_app_trigger_recurrence]
    deployAfter: [workflow]

  - id: secret_store
    category: data
    layer: 0
    description: Managed secret store / vault that holds secrets (see `secret`).
    terraformResources:
      aws: []   # Secrets Manager is a managed service; secrets are the units (see `secret`)
      gcp: []   # Secret Manager is API-enabled; secrets are the units (see `secret`)
      azure: [azurerm_key_vault]
    deployAfter: []

  - id: api_gateway
    category: data
    layer: 50
    description: Managed API front door (routing, auth, throttling).
    terraformResources:
      aws: [aws_api_gateway_rest_api, aws_apigatewayv2_api]
      gcp: [google_api_gateway_api, google_api_gateway_gateway]
      azure: [azurerm_api_management, azurerm_api_management_api]
    deployAfter: [tls_certificate, identity, static_ip, private_connectivity]

  - id: cdn
    category: data
    layer: 70
    description: Content delivery network / edge cache.
    terraformResources:
      aws: [aws_cloudfront_distribution]
      gcp: [google_compute_backend_bucket]
      azure: [azurerm_cdn_profile, azurerm_cdn_endpoint]
    deployAfter: [object_storage, waf]

  - id: full_text_search
    category: data
    layer: 20
    description: Managed lexical full-text search / indexing (see vector_search for embeddings).
    terraformResources:
      aws: [aws_opensearch_domain]
      gcp: []   # no first-class managed search resource in Terraform
      azure: [azurerm_search_service]
    deployAfter: [subnet, firewall, identity]

  - id: nosql_database
    category: data
    layer: 20
    description: Managed non-relational document / key-value database.
    terraformResources:
      aws: [aws_dynamodb_table, aws_dynamodb_global_table, aws_dax_cluster]
      gcp: [google_firestore_database]
      azure: [azurerm_cosmosdb_account, azurerm_cosmosdb_sql_database, azurerm_cosmosdb_sql_container]
    deployAfter: [subnet, identity]

  - id: wide_column_database
    category: data
    layer: 20
    description: Petabyte-scale wide-column / columnar NoSQL store (Bigtable / Cassandra model).
    terraformResources:
      aws: [aws_keyspaces_keyspace, aws_keyspaces_table]
      gcp: [google_bigtable_instance, google_bigtable_table]
      azure: [azurerm_cosmosdb_cassandra_cluster, azurerm_cosmosdb_cassandra_keyspace]
    deployAfter: [subnet]

  - id: time_series_database
    category: data
    layer: 10
    description: Purpose-built time-series store for high-cardinality timestamped data.
    terraformResources:
      aws: [aws_timestreamwrite_database, aws_timestreamwrite_table]
      gcp: []   # no dedicated managed TSDB; Bigtable is the usual substrate
      azure: [azurerm_kusto_cluster, azurerm_kusto_database]
    deployAfter: [identity]

  - id: managed_kafka
    category: data
    layer: 20
    description: Managed Apache Kafka broker cluster (Kafka wire-protocol streaming).
    terraformResources:
      aws: [aws_msk_cluster, aws_msk_serverless_cluster]
      gcp: [google_managed_kafka_cluster, google_managed_kafka_topic]
      azure: [azurerm_hdinsight_kafka_cluster]
    deployAfter: [subnet, firewall, object_storage, identity]

  - id: event_bus
    category: data
    layer: 10
    description: Rule-based event router / event bus with content filtering (vs broadcast message_bus).
    terraformResources:
      aws: [aws_cloudwatch_event_bus, aws_cloudwatch_event_rule, aws_cloudwatch_event_target]
      gcp: [google_eventarc_trigger]
      azure: [azurerm_eventgrid_topic, azurerm_eventgrid_system_topic, azurerm_eventgrid_event_subscription]
    deployAfter: [identity]

  - id: notification
    category: data
    layer: 10
    description: Multi-channel end-user notification delivery (push / SMS / email).
    terraformResources:
      aws: [aws_pinpoint_app, aws_sns_platform_application]
      gcp: []   # no managed multi-channel notification service with TF resources
      azure: [azurerm_notification_hub, azurerm_notification_hub_namespace]
    deployAfter: [identity]

  - id: data_pipeline
    category: data
    layer: 20
    description: Managed ETL/ELT batch & streaming data transformation jobs.
    terraformResources:
      aws: [aws_glue_job, aws_glue_trigger, aws_glue_crawler]
      gcp: [google_dataflow_job, google_data_fusion_instance, google_composer_environment]
      azure: [azurerm_data_factory, azurerm_data_factory_pipeline]
    deployAfter: [object_storage, identity, subnet]

  - id: data_catalog
    category: data
    layer: 10
    description: Central metadata catalog, schema registry, and data-lake governance.
    terraformResources:
      aws: [aws_glue_catalog_database, aws_glue_catalog_table, aws_lakeformation_resource]
      gcp: [google_dataplex_lake, google_dataplex_zone, google_dataplex_asset]
      azure: [azurerm_purview_account]
    deployAfter: [object_storage, identity]

  - id: database_migration
    category: data
    layer: 30
    description: Managed database migration & continuous replication (CDC) service.
    terraformResources:
      aws: [aws_dms_replication_instance, aws_dms_replication_task, aws_dms_endpoint]
      gcp: [google_database_migration_service_connection_profile, google_datastream_stream]
      azure: [azurerm_database_migration_service, azurerm_database_migration_project]
    deployAfter: [relational_database, secret]

  - id: vector_search
    category: data
    layer: 10
    description: Managed vector / embedding index for similarity search (RAG, semantic search).
    terraformResources:
