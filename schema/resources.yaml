    category: data
    layer: 20
    description: Durable in-memory database (MemoryDB).
    terraformResources:
      aws: [aws_memorydb_cluster]
      gcp: []
      azure: []
    deployAfter: [subnet, firewall]

  - id: message_broker
    category: data
    layer: 20
    description: Managed message broker (ActiveMQ / RabbitMQ).
    terraformResources:
      aws: [aws_mq_broker]
      gcp: []
      azure: []
    deployAfter: [subnet, firewall]

  - id: network_firewall
    category: networking
    layer: 20
    description: Managed stateful network firewall appliance inspecting traffic from a dedicated subnet.
    terraformResources:
      aws: [aws_networkfirewall_firewall]
      gcp: []
      azure: [azurerm_firewall]
    deployAfter: [subnet, network_firewall_policy]

  - id: topic_subscription
    category: data
    layer: 20
    description: Subscribes a queue/endpoint to a pub/sub topic (wiring).
    terraformResources:
      aws: [aws_sns_topic_subscription]
      gcp: [google_pubsub_subscription]
      azure: [azurerm_servicebus_subscription]
    deployAfter: [message_bus, queue]

  - id: event_source_mapping
    category: data
    layer: 30
    description: Wires a serverless function to an event source (queue/stream).
    terraformResources:
      aws: [aws_lambda_event_source_mapping]
      gcp: []
      azure: []
    deployAfter: [serverless_function, stream]

  - id: ai_guardrail
    category: ml
    layer: 40
    description: Safety guardrails / content filtering for generative-AI.
    terraformResources:
      aws: [aws_bedrock_guardrail]
      gcp: []
      azure: [azurerm_cognitive_account_rai_policy]
    deployAfter: [generative_ai_endpoint]

  # ----------------------------------------------------------------------------
  # Wiring / attachments
  # ----------------------------------------------------------------------------
  - id: key_vault_access_grant
    category: security
    layer: 10
    description: Grants an identity access to a secret store / key vault (wiring).
    terraformResources:
      aws: []
      gcp: []
      azure: [azurerm_key_vault_access_policy]
    deployAfter: [secret_store, identity]

  - id: identity_access_binding
    category: security
    layer: 10
    description: Grants IAM members access to a service account (wiring).
    terraformResources:
      aws: []
      gcp: [google_service_account_iam_member, google_service_account_iam_binding]
      azure: []
    deployAfter: [identity]

  - id: dns_zone_network_association
    category: networking
    layer: 20
    description: Links a private DNS zone to a network for internal resolution (wiring).
    terraformResources:
      aws: [aws_route53_zone_association]
      gcp: []
      azure: [azurerm_private_dns_zone_virtual_network_link]
    deployAfter: [dns_zone, virtual_network]

  - id: firewall_policy_attachment
    category: networking
    layer: 20
    description: Attaches a firewall policy to a network (wiring).
    terraformResources:
      aws: []
      gcp: [google_compute_network_firewall_policy_association, google_compute_firewall_policy_association]
      azure: []
    deployAfter: [firewall, virtual_network]

  - id: subnet_association
    category: networking
    layer: 20
    description: Associates a subnet with its route table / security group (wiring).
    terraformResources:
      aws: []
      gcp: []
      azure: [azurerm_subnet_route_table_association, azurerm_subnet_network_security_group_association]
    deployAfter: [subnet, route_table, firewall]

  - id: transit_gateway_peering
    category: networking
    layer: 30
    description: Peers two transit gateways (wiring).
    terraformResources:
      aws: [aws_ec2_transit_gateway_peering_attachment, aws_ec2_transit_gateway_peering_attachment_accepter]
      gcp: []
      azure: []
    deployAfter: [transit_gateway]

  - id: direct_connect_gateway_association
    category: networking
    layer: 40
    description: Associates a Direct Connect gateway with a transit/VPN gateway (wiring).
    terraformResources:
      aws: [aws_dx_gateway_association]
      gcp: []
      azure: []
    deployAfter: [hybrid_interconnect, vpn_gateway]

  - id: router_bgp_session
    category: networking
    layer: 40
    description: BGP interface/peer session on a cloud router (wiring).
    terraformResources:
      aws: []
      gcp: [google_compute_router_interface, google_compute_router_peer]
      azure: []
    deployAfter: [cloud_router, vpn_gateway]

  - id: subnet_nat_gateway_association
    category: networking
    layer: 40
    description: Associates a subnet with a NAT gateway (wiring).
    terraformResources:
      aws: []
      gcp: []
      azure: [azurerm_subnet_nat_gateway_association]
    deployAfter: [subnet, nat_gateway]

  - id: autoscaling_group_attachment
    category: networking
    layer: 50
    description: Attaches an autoscaling group to a load balancer (wiring).
    terraformResources:
      aws: [aws_autoscaling_attachment]
      gcp: []
      azure: []
    deployAfter: [autoscaling_group, load_balancer]

  - id: function_invoke_permission
    category: security
    layer: 60
    description: Grants an invoker permission to call a serverless function (wiring).
    terraformResources:
      aws: [aws_lambda_permission]
      gcp: []
      azure: []
    deployAfter: [serverless_function, api_gateway]

  - id: load_balancer_target_attachment
    category: networking
    layer: 60
    description: Registers a compute target into a load balancer target group (wiring).
    terraformResources:
      aws: [aws_lb_target_group_attachment]
      gcp: []
      azure: []
    deployAfter: [load_balancer, compute_instance]

  - id: virtual_machine_extension
    category: compute
    layer: 60
    description: Post-deploy extension/config applied to a VM or scale set (wiring).
    terraformResources:
      aws: []
      gcp: []
      azure: [azurerm_virtual_machine_extension, azurerm_virtual_machine_scale_set_extension]
    deployAfter: [compute_instance, autoscaling_group]

  # ----------------------------------------------------------------------------
  # Kubernetes ecosystem (cloud-agnostic; runs inside a kubernetes_cluster)
  # ----------------------------------------------------------------------------
  - id: k8s_namespace
    category: compute
    layer: 30
    description: Virtual cluster scope that isolates a group of Kubernetes resources.
    terraformResources:
      kubernetes: [kubernetes_namespace, kubernetes_namespace_v1]
    deployAfter: [kubernetes_cluster]

  - id: k8s_storage_class
    category: storage
    layer: 30
    description: Cluster-wide class of storage that volume claims can request.
    terraformResources:
      kubernetes: [kubernetes_storage_class, kubernetes_storage_class_v1]
    deployAfter: [kubernetes_cluster]

  - id: k8s_cluster_role
    category: security
    layer: 30
    description: Cluster-scoped RBAC role (a set of permissions).
    terraformResources:
      kubernetes: [kubernetes_cluster_role, kubernetes_cluster_role_v1]
    deployAfter: [kubernetes_cluster]

  - id: k8s_config_map
    category: compute
    layer: 40
    description: Non-confidential key/value configuration consumed by pods.
    terraformResources:
      kubernetes: [kubernetes_config_map, kubernetes_config_map_v1, kubernetes_config_map_v1_data]
    deployAfter: [k8s_namespace]

  - id: k8s_secret
    category: security
    layer: 40
    description: Namespaced confidential key/value data consumed by pods.
    terraformResources:
      kubernetes: [kubernetes_secret, kubernetes_secret_v1]
    deployAfter: [k8s_namespace]

  - id: k8s_service_account
    category: security
    layer: 40
    description: Identity for processes running in a pod.
    terraformResources:
      kubernetes: [kubernetes_service_account, kubernetes_service_account_v1]
    deployAfter: [k8s_namespace]

  - id: k8s_role
    category: security
    layer: 40
    description: Namespaced RBAC role (a set of permissions).
    terraformResources:
      kubernetes: [kubernetes_role, kubernetes_role_v1]
    deployAfter: [k8s_namespace]

  - id: k8s_pvc
    category: storage
    layer: 40
    description: A pod's request for persistent storage from a storage class.
    terraformResources:
      kubernetes: [kubernetes_persistent_volume_claim, kubernetes_persistent_volume_claim_v1]
    deployAfter: [k8s_namespace, k8s_storage_class]

  - id: k8s_service
    category: networking
    layer: 40
    description: Stable network endpoint that load-balances across a set of pods.
    terraformResources:
      kubernetes: [kubernetes_service, kubernetes_service_v1]
    deployAfter: [k8s_namespace]

  - id: k8s_network_policy
    category: networking
    layer: 40
    description: Pod-level ingress/egress traffic rules.
    terraformResources:
      kubernetes: [kubernetes_network_policy, kubernetes_network_policy_v1]
    deployAfter: [k8s_namespace]

  - id: k8s_role_binding
    category: security
    layer: 50
    description: Grants a namespaced role to a subject (service account / user / group).
    terraformResources:
      kubernetes: [kubernetes_role_binding, kubernetes_role_binding_v1]
    deployAfter: [k8s_role, k8s_service_account]

  - id: k8s_cluster_role_binding
    category: security
    layer: 50
    description: Grants a cluster role to a subject across the whole cluster.
    terraformResources:
      kubernetes: [kubernetes_cluster_role_binding, kubernetes_cluster_role_binding_v1]
    deployAfter: [k8s_cluster_role, k8s_service_account]

  - id: k8s_deployment
    category: compute
    layer: 50
    description: Declarative management of a replicated, stateless set of pods.
    terraformResources:
      kubernetes: [kubernetes_deployment, kubernetes_deployment_v1]
    deployAfter: [k8s_namespace, k8s_config_map, k8s_secret, k8s_service_account, k8s_pvc]

  - id: k8s_stateful_set
    category: compute
    layer: 50
    description: Manages stateful pods with stable identities and storage.
    terraformResources:
      kubernetes: [kubernetes_stateful_set, kubernetes_stateful_set_v1]
    deployAfter: [k8s_namespace, k8s_config_map, k8s_secret, k8s_pvc]

  - id: k8s_daemonset
    category: compute
    layer: 50
    description: Runs a copy of a pod on every (or selected) node.
    terraformResources:
      kubernetes: [kubernetes_daemonset, kubernetes_daemon_set_v1]
    deployAfter: [k8s_namespace, k8s_config_map, k8s_secret]

  - id: k8s_job
    category: compute
    layer: 50
    description: Runs pods to completion for a batch task.
    terraformResources:
      kubernetes: [kubernetes_job, kubernetes_job_v1]
    deployAfter: [k8s_namespace, k8s_config_map, k8s_secret]

  - id: k8s_cron_job
    category: compute
    layer: 50
    description: Runs a Job on a recurring schedule.
    terraformResources:
      kubernetes: [kubernetes_cron_job, kubernetes_cron_job_v1]
    deployAfter: [k8s_namespace, k8s_config_map, k8s_secret]

  - id: k8s_ingress
    category: networking
    layer: 50
    description: HTTP(S) routing rules exposing services outside the cluster.
    terraformResources:
      kubernetes: [kubernetes_ingress, kubernetes_ingress_v1]
    deployAfter: [k8s_service]

  - id: helm_release
    category: compute
    layer: 50
    description: Installs a Helm chart (a packaged bundle of Kubernetes resources).
    terraformResources:
      helm: [helm_release]
    deployAfter: [k8s_namespace]

  - id: kubectl_manifest
    category: compute
    layer: 50
    description: Applies an arbitrary raw Kubernetes manifest / CRD.
    terraformResources:
      kubectl: [kubectl_manifest]
    deployAfter: [k8s_namespace]

  - id: k8s_hpa
    category: compute
    layer: 60
    description: Autoscales a workload's replica count on observed metrics.
    terraformResources:
      kubernetes: [kubernetes_horizontal_pod_autoscaler, kubernetes_horizontal_pod_autoscaler_v2]
    deployAfter: [k8s_deployment]

  - id: k8s_pod_disruption_budget
    category: compute
    layer: 60
    description: Limits voluntary disruptions to a workload's pods.
    terraformResources:
      kubernetes: [kubernetes_pod_disruption_budget, kubernetes_pod_disruption_budget_v1]
    deployAfter: [k8s_deployment]
